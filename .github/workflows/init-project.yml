name: Initialize Project

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  init:
    runs-on: ubuntu-latest
    if: github.run_number == 1

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: replace placeholders
        run: |
          find . \
            -not -path './.git/*' \
            -not -path './.github/workflows/init-project.yml' \
            -type f \
            -exec grep -lI 'GEODE-PROJECT-NAME\|GEODE-AUTHOR-NAME' {} \; \
            | xargs -r sed -i \
              -e "s/GEODE-PROJECT-NAME/${{ github.event.repository.name }}/g" \
              -e "s/GEODE-AUTHOR-NAME/${{ github.repository_owner }}/g"

      - name: remove this workflow file
        run: rm .github/workflows/init-project.yml

      - name: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: initialize project as ${{ github.repository_owner }}/${{ github.event.repository.name }}"
          git push
